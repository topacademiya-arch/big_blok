<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Neon Shooter: Grenades</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; user-select: none; background: #000; }
        
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 24px; height: 24px;
            border: 2px solid rgba(0, 255, 0, 0.7); border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none; z-index: 10;
            transition: width 0.1s, height 0.1s;
        }
        #crosshair.shooting { width: 35px; height: 35px; border-color: #fff; }
        #crosshair::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            width: 4px; height: 4px; background: #0f0;
            transform: translate(-50%, -50%); border-radius: 50%;
        }

        #ui-top {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            text-align: center; color: white; pointer-events: none;
            text-shadow: 0 0 5px #000;
        }
        .wave-title { font-size: 30px; font-weight: bold; color: #ff0055; letter-spacing: 3px; }
        .wave-info { font-size: 16px; color: #ccc; }

        #ui-bottom {
            position: absolute; bottom: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; align-items: flex-end;
            color: white; pointer-events: none;
        }
        
        .w-panel { 
            background: rgba(0,0,0,0.6); padding: 10px 20px; 
            border-left: 4px solid #0f0; border-radius: 0 5px 5px 0; 
            backdrop-filter: blur(2px);
        }
        .w-name { font-size: 14px; color: #aaa; text-transform: uppercase; }
        .w-ammo { font-size: 36px; font-weight: bold; font-family: monospace; }
        
        .w-slots { display: flex; gap: 5px; margin-top: 8px; }
        .slot { 
            width: 25px; height: 25px; border: 1px solid #555; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 12px; color: #555; background: rgba(0,0,0,0.5);
        }
        .slot.active { border-color: #0f0; color: #0f0; background: rgba(0,255,0,0.2); box-shadow: 0 0 5px #0f0; }

        /* Панель гранат */
        .grenade-panel {
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .grenade-icon {
            width: 20px; height: 20px; background: #0f0; border-radius: 50%;
            box-shadow: 0 0 5px #0f0;
        }
        .grenade-count { font-size: 20px; font-weight: bold; color: #0f0; }
        .grenade-label { font-size: 12px; color: #aaa; }

        .stats-panel { text-align: right; }
        .hp-bar-bg { width: 200px; height: 15px; background: #333; margin-top: 5px; border: 1px solid #555; }
        .hp-bar-fill { width: 100%; height: 100%; background: #0f0; transition: width 0.2s; box-shadow: 0 0 10px #0f0; }

        #blocker {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(5px);
            display: flex; justify-content: center; align-items: center;
            z-index: 20; color: white; flex-direction: column;
        }
        .menu-box {
            background: #1a1a1a; padding: 40px; border: 1px solid #333;
            text-align: center; border-radius: 4px; min-width: 400px;
            box-shadow: 0 0 30px rgba(0,255,0,0.1);
        }
        h1 { margin: 0 0 20px 0; color: #0f0; letter-spacing: 5px; text-shadow: 0 0 10px #0f0; }
        button.start-btn {
            background: #0f0; color: #000; border: none;
            padding: 15px 40px; font-size: 20px; font-weight: bold;
            cursor: pointer; text-transform: uppercase; width: 100%;
            transition: 0.2s;
        }
        button.start-btn:hover { background: #fff; box-shadow: 0 0 20px #0f0; }

        #boss-hp-container {
            position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
            width: 60%; height: 25px; background: #220000; border: 2px solid #500;
            display: none; z-index: 5; box-shadow: 0 0 10px #f00;
        }
        #boss-hp-fill { width: 100%; height: 100%; background: #f00; transition: width 0.1s linear; }
        
        #damage-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 0 0 rgba(255,0,0,0);
            pointer-events: none; transition: 0.1s; z-index: 5;
        }
        
        /* Меню улучшения */
        #upgrade-menu {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 20, 0, 0.9);
            border: 2px solid #0f0;
            padding: 20px;
            color: white;
            display: none;
            z-index: 15;
            text-align: center;
            border-radius: 8px;
            pointer-events: none;
        }
        .up-title { font-size: 20px; color: #0f0; margin-bottom: 10px; font-weight: bold; }
        .up-cost { font-size: 24px; color: #ff0; margin-bottom: 5px; }
        .up-desc { font-size: 14px; color: #ccc; }

    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="crosshair"></div>
    <div id="damage-overlay"></div>
    
    <!-- Меню улучшения -->
    <div id="upgrade-menu">
        <div class="up-title" id="up-title">UPGRADE TURRET</div>
        <div class="up-cost" id="up-cost">COST: 1000</div>
        <div class="up-desc" id="up-desc">Next Level: Rapid Fire</div>
    </div>

    <div id="ui-top">
        <div class="wave-title" id="ui-wave">WAVE 1</div>
        <div class="wave-info">Врагов: <span id="ui-enemies">20</span> | Счет: <span id="ui-score">0</span></div>
    </div>

    <div id="boss-hp-container"><div id="boss-hp-fill"></div></div>

    <div id="ui-bottom">
        <div class="w-panel">
            <div class="w-name" id="ui-wname">BLASTER</div>
            <div class="w-ammo"><span id="ui-ammo">20</span></div>
            <div class="w-slots">
                <div class="slot active" id="slot-1">1</div>
                <div class="slot" id="slot-2">2</div>
                <div class="slot" id="slot-3">3</div>
                <div class="slot" id="slot-4">4</div>
                <div class="slot" id="slot-5" style="color:#0ff">5</div>
            </div>
            
            <!-- Индикатор гранат -->
            <div class="grenade-panel">
                <div class="grenade-icon"></div>
                <div>
                    <div class="grenade-count" id="ui-grenades">3</div>
                    <div class="grenade-label">GRENADES [G]</div>
                </div>
            </div>
        </div>
        <div class="stats-panel">
            <div style="font-size: 12px; color:#aaa;">ЗДОРОВЬЕ</div>
            <div class="hp-bar-bg"><div id="ui-hp" class="hp-bar-fill"></div></div>
        </div>
    </div>

    <div id="blocker">
        <div class="menu-box">
            <h1>NEON DEFENSE</h1>
            <p style="color:#aaa; margin-bottom: 20px;">
                [G] Бросить гранату<br>
                [5] Строить / Улучшать турели<br>
                Lvl6: QUAD ROCKET (15k)
            </p>
            <button class="start-btn" id="start-btn">НАЧАТЬ</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- КОНФИГУРАЦИЯ ---
        const ENEMIES_PER_WAVE = 20;
        const BOSS_INTERVAL = 5; 
        const TURRET_COST = 200;
        const MAX_TURRETS = 5; 
        
        // Цены улучшений
        const UPGRADE_LV2_COST = 1000;
        const UPGRADE_LV3_COST = 2500;
        const UPGRADE_LV4_COST = 5000;
        const UPGRADE_LV5_COST = 9000;
        const UPGRADE_LV6_COST = 15000;

        const WEAPONS = {
            blaster: { id: 1, name: "Pulse Gun", damage: 25, rate: 150, mag: 20, reload: 1200, color: 0x00ffff, speed: 100, spread: 0.02, auto: false },
            plasma: { id: 2, name: "Plasma SMG", damage: 8, rate: 70, mag: 50, reload: 2000, color: 0xff00ff, speed: 90, spread: 0.06, auto: true },
            flamethrower: { id: 3, name: "Incinerator", damage: 2, rate: 30, mag: 100, reload: 3000, color: 0xffaa00, speed: 25, spread: 0.25, auto: true, type: 'fire' },
            rocket: { id: 4, name: "Bazooka", damage: 150, rate: 1200, mag: 4, reload: 3500, color: 0x333333, speed: 40, spread: 0, auto: false, type: 'rocket' },
            turret_tool: { id: 5, name: "Builder / Upgrader", damage: 0, rate: 500, mag: 1, reload: 0, color: 0x00ff00, speed: 0, spread: 0, auto: false, type: 'tool' }
        };

        // --- ПЕРЕМЕННЫЕ ---
        let camera, scene, renderer, controls;
        let moveF=false, moveB=false, moveL=false, moveR=false;
        let prevTime = performance.now();
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        
        let gunMesh;
        let bullets = [];
        let grenades = []; // Массив активных гранат
        let enemies = [];
        let turrets = []; 
        let items = []; // Предметы
        let particles = [];
        let obstacles = []; 
        
        let score = 1000; 
        let health = 100;
        let isGameOver = false;
        let isMouseDown = false;
        
        // Гранаты
        let grenadeCount = 3;
        const MAX_GRENADES = 5;
        let lastGrenadeTime = 0;
        const GRENADE_REGEN_TIME = 10000; // 10 секунд на регенерацию
        
        let wave = 1;
        let enemiesToSpawn = 0;
        let spawnTimer = 0;
        let bossActive = false;
        let bossLevel = 0; 

        let currentWeaponKey = 'blaster';
        let ammo = WEAPONS.blaster.mag;
        let lastShotTime = 0;
        let isReloading = false;
        let reloadEndTime = 0;

        // DOM
        const uiWave = document.getElementById('ui-wave');
        const uiEnemiesLeft = document.getElementById('ui-enemies');
        const uiAmmo = document.getElementById('ui-ammo');
        const uiName = document.getElementById('ui-wname');
        const uiHp = document.getElementById('ui-hp');
        const uiScore = document.getElementById('ui-score');
        const uiGrenades = document.getElementById('ui-grenades');
        const bossBar = document.getElementById('boss-hp-container');
        const bossFill = document.getElementById('boss-hp-fill');
        const upgradeMenu = document.getElementById('upgrade-menu');
        const upTitle = document.getElementById('up-title');
        const upCost = document.getElementById('up-cost');
        const upDesc = document.getElementById('up-desc');

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050510);
            scene.fog = new THREE.FogExp2(0x050510, 0.015);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            scene.add(new THREE.AmbientLight(0x404040));
            const dl = new THREE.DirectionalLight(0xffffff, 0.6);
            dl.position.set(10, 20, 10);
            scene.add(dl);

            controls = new PointerLockControls(camera, document.body);
            const blocker = document.getElementById('blocker');
            const startBtn = document.getElementById('start-btn');

            startBtn.addEventListener('click', () => {
                if(!isGameOver) controls.lock();
                else resetGame();
            });

            controls.addEventListener('lock', () => {
                blocker.style.display = 'none';
            });
            controls.addEventListener('unlock', () => {
                if(!isGameOver) {
                    blocker.style.display = 'flex';
                    startBtn.innerText = "ПРОДОЛЖИТЬ";
                }
            });

            scene.add(controls.getObject());

            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            document.addEventListener('mousedown', () => isMouseDown = true);
            document.addEventListener('mouseup', () => isMouseDown = false);

            createLevel();
            createGun();

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            window.addEventListener('resize', onWindowResize);

            updateUI();
        }

        function createLevel() {
            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(300, 300),
                new THREE.MeshStandardMaterial({ color: 0x111111 })
            );
            floor.rotation.x = -Math.PI/2;
            scene.add(floor);

            const grid = new THREE.GridHelper(300, 60, 0x0044ff, 0x222222);
            scene.add(grid);

            const geo = new THREE.BoxGeometry(1,1,1);
            const mat = new THREE.MeshStandardMaterial({ color: 0x222244 });
            for(let i=0; i<40; i++) {
                const mesh = new THREE.Mesh(geo, mat);
                const h = 5 + Math.random() * 10;
                const w = 5+Math.random()*5;
                const d = 5+Math.random()*5;
                
                mesh.scale.set(w, h, d);
                let x = (Math.random()-0.5) * 200;
                let z = (Math.random()-0.5) * 200;
                if(Math.abs(x) < 20 && Math.abs(z) < 20) { x += 30; z += 30; }
                
                mesh.position.set(x, h/2, z);
                scene.add(mesh);
                
                const box = new THREE.Box3().setFromObject(mesh);
                obstacles.push(box);
            }
        }

        function createGun() {
            gunMesh = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.2, 0.6), new THREE.MeshStandardMaterial({color:0x333}));
            gunMesh.add(body);
            const core = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.05, 0.4), new THREE.MeshBasicMaterial({color:0x0ff}));
            core.position.set(0, 0.12, 0);
            core.name = "core";
            gunMesh.add(core);
            gunMesh.position.set(0.25, -0.25, -0.4);
            camera.add(gunMesh);
        }

        function switchWeapon(key) {
            if(isReloading || currentWeaponKey === key) return;
            currentWeaponKey = key;
            const w = WEAPONS[key];
            
            if(w.type !== 'tool') {
                ammo = w.mag;
                isReloading = false;
                gunMesh.visible = true;
                gunMesh.getObjectByName("core").material.color.setHex(w.color);
            } else {
                gunMesh.visible = false; 
            }
            
            updateUI();
        }

        function onKeyDown(e) {
            switch(e.code) {
                case 'KeyW': moveF=true; break;
                case 'KeyS': moveB=true; break;
                case 'KeyA': moveL=true; break;
                case 'KeyD': moveR=true; break;
                case 'Space': if(canJump) { velocity.y += 15; canJump=false; } break;
                case 'KeyR': startReload(); break;
                case 'Digit1': switchWeapon('blaster'); break;
                case 'Digit2': switchWeapon('plasma'); break;
                case 'Digit3': switchWeapon('flamethrower'); break;
                case 'Digit4': switchWeapon('rocket'); break;
                case 'Digit5': switchWeapon('turret_tool'); break;
                case 'KeyG': throwGrenade(); break; // ГРАНATA
            }
        }
        function onKeyUp(e) {
            switch(e.code) {
                case 'KeyW': moveF=false; break;
                case 'KeyS': moveB=false; break;
                case 'KeyA': moveL=false; break;
                case 'KeyD': moveR=false; break;
            }
        }

        function startReload() {
            if(currentWeaponKey === 'turret_tool') return;
            const w = WEAPONS[currentWeaponKey];
            if(isReloading || ammo === w.mag) return;
            isReloading = true;
            reloadEndTime = performance.now() + w.reload;
            gunMesh.position.y = -0.5; 
        }

        // --- ЛОГИКА ГРАНАТ ---
        function throwGrenade() {
            if(grenadeCount <= 0) {
                showMessage("NO GRENADES!");
                return;
            }
            
            grenadeCount--;
            updateUI();

            const now = performance.now();
            lastGrenadeTime = now;

            // Создаем модель гранаты
            const geo = new THREE.SphereGeometry(0.2, 8, 8);
            const mat = new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x004400 });
            const mesh = new THREE.Mesh(geo, mat);
            
            // Позиция броска (от игрока)
            const startPos = controls.getObject().position.clone();
            startPos.y -= 0.5; // Чуть ниже глаз
            
            // Вектор направления
            const dir = new THREE.Vector3();
            controls.getDirection(dir);
            
            mesh.position.copy(startPos).add(dir.clone().multiplyScalar(1));
            
            // Физика броска
            const force = 25; // Сила броска вперед
            const upForce = 10; // Подброс вверх
            
            mesh.userData = {
                vel: dir.multiplyScalar(force).add(new THREE.Vector3(0, upForce, 0)),
                spawnTime: now,
                explodeTime: 2000, // 2 секунды до взрыва
                bounced: false
            };
            
            scene.add(mesh);
            grenades.push(mesh);
        }

        function explodeGrenade(grenade) {
            const pos = grenade.position;
            
            // Визуал взрыва
            const light = new THREE.PointLight(0x00ff00, 10, 20);
            light.position.copy(pos);
            scene.add(light);
            setTimeout(() => scene.remove(light), 100);
            
            createParticles(pos, 0x00ff00, 30);
            
            // Урон по области
            const blastRadius = 12;
            const damage = 500;
            
            enemies.forEach(e => {
                const dist = e.position.distanceTo(pos);
                if(dist < blastRadius) {
                    // Наносим урон
                    e.userData.hp -= damage;
                    
                    // Отбрасывание
                    const pushDir = new THREE.Vector3().subVectors(e.position, pos).normalize();
                    e.position.add(pushDir.multiplyScalar(5));
                    
                    if(e.userData.type === 'boss') bossFill.style.width = (e.userData.hp/e.userData.maxHp*100)+'%';
                    
                    // Проверка смерти
                    if(e.userData.hp <= 0) {
                        killEnemy(e);
                    } else {
                        // Мигание белым
                        e.material.emissive.setHex(0xffffff);
                        setTimeout(()=>e.material.emissive.setHex(0x330000), 50);
                    }
                }
            });
            
            scene.remove(grenade);
            grenades = grenades.filter(g => g !== grenade);
        }

        function killEnemy(e) {
             score += e.userData.type === 'boss' ? 5000 * bossLevel : 50;
                                
            // Если это босс - спавним аптечку
            if(e.userData.type === 'boss') {
                spawnMedkit(e.position);
                bossActive = false;
                bossLevel = 0; 
                bossBar.style.display = 'none';
                createParticles(e.position, 0xff0000, 100);
                showMessage("BOSS DEFEATED! MEDKIT DROPPED");
            } else {
                createParticles(e.position, 0xff0000, 10);
            }
            
            scene.remove(e);
            enemies = enemies.filter(en => en !== e);
            updateUI();
        }

        // --- ЛОГИКА СТРОИТЕЛЬСТВА И УЛУЧШЕНИЯ ---
        function handleToolClick() {
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const intersects = raycaster.intersectObjects(scene.children);

            let clickedTurret = null;

            for (let hit of intersects) {
                let obj = hit.object;
                while(obj.parent && obj.parent !== scene) {
                    obj = obj.parent;
                }
                
                const found = turrets.find(t => t.mesh === obj);
                if(found) {
                    clickedTurret = found;
                    break;
                }
            }

            if(clickedTurret) {
                upgradeTurret(clickedTurret);
            } else {
                placeTurret(intersects);
            }
        }

        function placeTurret(intersects) {
            if(turrets.length >= MAX_TURRETS) {
                showMessage("MAX TURRETS (" + MAX_TURRETS + ") REACHED!");
                return;
            }

            if(score < TURRET_COST) {
                showMessage("Need " + TURRET_COST + " Points!");
                return;
            }

            for (let i = 0; i < intersects.length; i++) {
                const obj = intersects[i].object;
                if(obj.geometry && (obj.geometry.type === 'PlaneGeometry' || obj.geometry.type === 'BoxGeometry')) {
                    const pos = intersects[i].point;
                    
                    const testBox = new THREE.Box3().setFromCenterAndSize(pos, new THREE.Vector3(2,2,2));
                    let collides = false;
                    for(let obs of obstacles) {
                        if(obs.intersectsBox(testBox)) collides = true;
                    }
                    for(let t of turrets) {
                        if(t.mesh.position.distanceTo(pos) < 3) collides = true;
                    }
                    if(collides) continue;

                    createTurretMesh(pos, 1);
                    score -= TURRET_COST;
                    updateUI();
                    return;
                }
            }
        }

        function createTurretMesh(pos, level) {
            const turretGroup = new THREE.Group();
            turretGroup.position.copy(pos);
            turretGroup.position.y = 0.75;

            let baseColor = 0x00aaaa;
            let headColor = 0x00ffff;
            let barrelColor = 0xffff00;
            let barrelGeo = new THREE.CylinderGeometry(0.1, 0.1, 1.0);
            let headGeo = new THREE.BoxGeometry(0.6, 0.6, 1.2);

            if(level === 2) { headColor = 0x0088ff; barrelColor = 0x00ffff; }
            if(level === 3) { headColor = 0xff4400; barrelColor = 0xffaa00; }
            if(level === 4) {
                baseColor = 0x333333; headColor = 0x222222; barrelColor = 0xff0000;
                barrelGeo = new THREE.BoxGeometry(0.4, 0.4, 1.2);
            }
            if(level === 5) {
                 baseColor = 0x444444; headColor = 0x111111; barrelColor = 0x00ffff;
                 barrelGeo = new THREE.CylinderGeometry(0.2, 0.2, 1.0);
            }
            if(level === 6) {
                baseColor = 0x111111; headColor = 0x000000; barrelColor = 0xff0000;
                headGeo = new THREE.BoxGeometry(1.2, 0.8, 1.2);
            }

            const base = new THREE.Mesh(
                new THREE.CylinderGeometry(0.5, 0.8, 1.5, 8),
                new THREE.MeshStandardMaterial({ color: baseColor })
            );
            base.position.y = 0; 
            turretGroup.add(base);
            
            const head = new THREE.Mesh(headGeo, new THREE.MeshStandardMaterial({ color: headColor }));
            head.position.y = 1.0;
            turretGroup.add(head);
            
            if(level === 6) {
                const positions = [
                    {x: -0.3, y: 0.2}, {x: 0.3, y: 0.2},
                    {x: -0.3, y: -0.2}, {x: 0.3, y: -0.2}
                ];
                positions.forEach(p => {
                    const b = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.25, 1.0), new THREE.MeshBasicMaterial({color: barrelColor}));
                    b.rotation.x = Math.PI/2;
                    b.position.set(p.x, p.y, 0.5);
                    head.add(b);
                });
            } else {
                const barrel = new THREE.Mesh(barrelGeo, new THREE.MeshBasicMaterial({ color: barrelColor }));
                barrel.rotation.x = Math.PI/2;
                barrel.position.set(0, 0, 0.6);
                head.add(barrel);
            }

            scene.add(turretGroup);
            
            const turretData = {
                mesh: turretGroup,
                head: head,
                level: level,
                hp: 200 * level,
                maxHp: 200 * level,
                cooldown: 0,
                range: 60
            };
            
            updateTurretStats(turretData);
            turrets.push(turretData);
            createParticles(pos, 0x00ff00, 10);
        }

        function updateTurretStats(t) {
            if(t.level === 1) { t.fireRate = 0.4; t.damage = 10; t.type = 'normal'; }
            else if (t.level === 2) { t.fireRate = 0.15; t.damage = 15; t.type = 'normal'; }
            else if (t.level === 3) { t.fireRate = 0.1; t.damage = 5; t.type = 'fire'; }
            else if (t.level === 4) { t.fireRate = 1.2; t.damage = 100; t.type = 'rocket'; }
            else if (t.level === 5) { t.fireRate = 0.05; t.damage = 8; t.type = 'normal'; }
            else if (t.level === 6) { t.fireRate = 1.5; t.damage = 150; t.type = 'quad_rocket'; }
        }

        function upgradeTurret(t) {
            const nextLevel = t.level + 1;
            let cost = 0;
            if(nextLevel === 2) cost = UPGRADE_LV2_COST;
            if(nextLevel === 3) cost = UPGRADE_LV3_COST;
            if(nextLevel === 4) cost = UPGRADE_LV4_COST;
            if(nextLevel === 5) cost = UPGRADE_LV5_COST;
            if(nextLevel === 6) cost = UPGRADE_LV6_COST;

            if(t.level >= 6) {
                showMessage("MAX LEVEL REACHED");
                return;
            }

            if(score < cost) {
                showMessage(`Need ${cost} Points!`);
                return;
            }

            score -= cost;
            const pos = t.mesh.position.clone();
            scene.remove(t.mesh);
            turrets = turrets.filter(existing => existing !== t);
            createTurretMesh(pos, nextLevel);
            createParticles(pos, 0xffff00, 20);
            showMessage("UPGRADED TO LEVEL " + nextLevel);
            updateUI();
        }

        function shoot() {
            if(isReloading || isGameOver) return;
            const now = performance.now();
            const w = WEAPONS[currentWeaponKey];
            if(now - lastShotTime < w.rate) return;
            if(ammo <= 0) { startReload(); return; }

            lastShotTime = now;
            if(w.type !== 'tool') {
                ammo--;
                updateUI();
                gunMesh.position.z += 0.15;
                gunMesh.rotation.x += 0.15;
                crosshair.classList.add('shooting');
                setTimeout(() => crosshair.classList.remove('shooting'), 100);
            }

            if(w.type === 'tool') {
                handleToolClick();
                return;
            }

            let b;
            if(w.type === 'rocket') {
                b = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.6), new THREE.MeshStandardMaterial({color:0x555}));
                b.rotation.x = Math.PI/2;
                b.userData = { type: 'rocket', dmg: w.damage };
            } else if (w.type === 'fire') {
                b = new THREE.Mesh(new THREE.SphereGeometry(0.3), new THREE.MeshBasicMaterial({color:w.color, transparent:true, opacity:0.8}));
                b.userData = { type: 'fire', life: 1.0 };
            } else {
                b = new THREE.Mesh(new THREE.SphereGeometry(0.08), new THREE.MeshBasicMaterial({color:w.color}));
                b.userData = { type: 'bullet', dmg: w.damage };
            }

            const vec = new THREE.Vector3();
            gunMesh.getWorldPosition(vec);
            b.position.copy(vec);

            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            dir.x += (Math.random()-0.5)*w.spread;
            dir.y += (Math.random()-0.5)*w.spread;
            dir.z += (Math.random()-0.5)*w.spread;
            dir.normalize();

            b.userData.vel = dir.multiplyScalar(w.speed);
            scene.add(b);
            bullets.push(b);
        }

        function startWave() {
            if(bossActive) return;
            if(wave > 1 && wave % BOSS_INTERVAL === 0) {
                spawnBoss();
            } else {
                enemiesToSpawn = ENEMIES_PER_WAVE + (wave * 2);
                uiWave.innerText = `WAVE ${wave}`;
                uiWave.style.color = "#ff0055";
            }
        }

        function spawnEnemy() {
            const angle = Math.random() * Math.PI * 2;
            const dist = 60 + Math.random() * 30;
            const x = controls.getObject().position.x + Math.cos(angle) * dist;
            const z = controls.getObject().position.z + Math.sin(angle) * dist;

            const hpMult = 1 + (wave * 0.3); 
            
            const e = new THREE.Mesh(
                new THREE.BoxGeometry(1.5, 1.5, 1.5),
                new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x330000 })
            );
            e.position.set(x, 0.75, z);
            e.userData = { 
                hp: 20 * hpMult, 
                maxHp: 20 * hpMult,
                dmg: (5 + wave) * 1.3,
                type: 'normal' 
            };
            scene.add(e);
            enemies.push(e);
        }

        function spawnBoss() {
            bossActive = true;
            bossLevel++; 
            bossBar.style.display = 'block';
            uiWave.innerText = `BOSS LEVEL ${bossLevel}`;
            uiWave.style.color = "#ff0000";
            
            const baseHp = 5000;
            const hpScale = Math.pow(1.6, bossLevel - 1); 
            const baseDmg = 25;
            const dmgScale = Math.pow(1.3, bossLevel - 1);
            const baseSpeed = 10;
            const speedScale = 1 + (bossLevel * 0.1);

            const boss = new THREE.Mesh(
                new THREE.BoxGeometry(8, 8, 8),
                new THREE.MeshStandardMaterial({ color: 0xaa0000, emissive: 0x550000 })
            );
            boss.position.set(0, 4, -80);
            boss.userData = { 
                hp: baseHp * hpScale, 
                maxHp: baseHp * hpScale, 
                dmg: baseDmg * dmgScale, 
                speed: baseSpeed * speedScale,
                type: 'boss',
                stuckTimer: 0,
                lastPos: new THREE.Vector3(0,4,-80)
            };
            scene.add(boss);
            enemies.push(boss);
        }

        function spawnMedkit(position) {
            const geometry = new THREE.BoxGeometry(1.5, 1.5, 1.5);
            const material = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
            const medkit = new THREE.Mesh(geometry, material);
            medkit.position.copy(position);
            medkit.position.y = 1.5;
            
            const crossGeo = new THREE.BoxGeometry(0.5, 0.5, 1.6);
            const crossMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            const crossH = new THREE.Mesh(crossGeo, crossMat);
            medkit.add(crossH);
            const crossV = new THREE.Mesh(crossGeo, crossMat);
            crossV.rotation.z = Math.PI/2;
            medkit.add(crossV);

            scene.add(medkit);
            items.push({ mesh: medkit, type: 'medkit', heal: 50 });
        }

        function showMessage(text) {
            const msg = document.createElement('div');
            msg.innerText = text;
            msg.style.position = 'absolute';
            msg.style.top = '60%';
            msg.style.left = '50%';
            msg.style.transform = 'translate(-50%, -50%)';
            msg.style.color = '#ff0';
            msg.style.fontSize = '20px';
            msg.style.fontWeight = 'bold';
            msg.style.textShadow = '0 0 5px black';
            msg.style.pointerEvents = 'none';
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 1000);
        }

        function createParticles(pos, color, count) {
            for(let i=0; i<count; i++) {
                const p = new THREE.Mesh(
                    new THREE.BoxGeometry(0.1, 0.1, 0.1),
                    new THREE.MeshBasicMaterial({ color: color })
                );
                p.position.copy(pos);
                p.userData = {
                    vel: new THREE.Vector3((Math.random()-0.5)*10, (Math.random()-0.5)*10, (Math.random()-0.5)*10),
                    life: 1.0
                };
                scene.add(p);
                particles.push(p);
            }
        }

        function takeDamage(amt) {
            health -= amt;
            updateUI();
            const ov = document.getElementById('damage-overlay');
            ov.style.boxShadow = "inset 0 0 100px 50px rgba(255,0,0,0.5)";
            setTimeout(()=>ov.style.boxShadow="none", 100);
            if(health <= 0) gameOver();
        }

        function updateUI() {
            uiAmmo.innerText = currentWeaponKey === 'turret_tool' ? `${turrets.length}/${MAX_TURRETS}` : Math.floor(ammo);
            uiGrenades.innerText = grenadeCount;
            uiName.innerText = WEAPONS[currentWeaponKey].name;
            uiScore.innerText = score;
            uiHp.style.width = Math.max(0, health) + '%';
            uiHp.style.backgroundColor = health > 50 ? '#0f0' : '#f00';
            
            const totalEnemies = enemies.length + enemiesToSpawn;
            uiEnemiesLeft.innerText = bossActive ? `BOSS LVL ${bossLevel}` : totalEnemies;

            for(let i=1; i<=5; i++) {
                const el = document.getElementById(`slot-${i}`);
                const key = Object.keys(WEAPONS).find(k => WEAPONS[k].id === i);
                if(key) el.classList.toggle('active', currentWeaponKey === key);
            }
        }

        function gameOver() {
            isGameOver = true;
            controls.unlock();
            document.querySelector('h1').innerText = "ПОТРАЧЕНО";
            document.querySelector('h1').style.color = "red";
            document.getElementById('start-btn').innerText = "ЗАНОВО";
            document.getElementById('blocker').style.display = 'flex';
        }

        function resetGame() {
            isGameOver = false; health = 100; score = 1000; wave = 1;
            bossActive = false; bossLevel = 0; bossBar.style.display = 'none';
            enemiesToSpawn = 0;
            currentWeaponKey = 'blaster'; ammo = WEAPONS.blaster.mag;
            isReloading = false;
            grenadeCount = 3;
            
            enemies.forEach(e => scene.remove(e));
            bullets.forEach(b => scene.remove(b));
            grenades.forEach(g => scene.remove(g));
            turrets.forEach(t => scene.remove(t.mesh));
            items.forEach(i => scene.remove(i.mesh));
            particles.forEach(p => scene.remove(p));
            
            enemies = []; bullets = []; grenades = []; turrets = []; items = []; particles = [];
            
            controls.getObject().position.set(0, 1.6, 0);
            startWave();
            updateUI();
            controls.lock();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        let canJump = false;

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();
            const delta = (time - prevTime) / 1000;
            prevTime = time;

            upgradeMenu.style.display = 'none';

            if(controls.isLocked && !isGameOver) {
                // Регенерация гранат
                if(grenadeCount < MAX_GRENADES && time - lastGrenadeTime > GRENADE_REGEN_TIME) {
                    grenadeCount++;
                    lastGrenadeTime = time; // Сброс таймера для следующей
                    updateUI();
                }

                if(isReloading && time >= reloadEndTime) {
                    isReloading = false;
                    ammo = WEAPONS[currentWeaponKey].mag;
                    gunMesh.position.set(0.25, -0.25, -0.4);
                    updateUI();
                }

                if(isMouseDown) {
                    if(WEAPONS[currentWeaponKey].auto || WEAPONS[currentWeaponKey].type === 'tool') shoot();
                }

                // Физика игрока
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 20.0 * delta;
                direction.z = Number(moveF) - Number(moveB);
                direction.x = Number(moveR) - Number(moveL);
                direction.normalize();
                
                if(moveF || moveB) velocity.z -= direction.z * 400.0 * delta;
                if(moveL || moveR) velocity.x -= direction.x * 400.0 * delta;

                const oldPos = controls.getObject().position.clone();
                
                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);
                
                const playerBox = new THREE.Box3().setFromCenterAndSize(controls.getObject().position, new THREE.Vector3(1, 2, 1));
                for(let obs of obstacles) {
                    if(obs.intersectsBox(playerBox)) {
                        controls.getObject().position.copy(oldPos);
                        velocity.x = 0;
                        velocity.z = 0;
                        break;
                    }
                }

                controls.getObject().position.y += velocity.y * delta;
                if(controls.getObject().position.y < 1.6) {
                    velocity.y = 0;
                    controls.getObject().position.y = 1.6;
                    canJump = true;
                }

                if(gunMesh.visible) {
                    gunMesh.position.lerp(new THREE.Vector3(0.25, isReloading?-0.5:-0.25, -0.4), 0.1);
                    gunMesh.rotation.x = THREE.MathUtils.lerp(gunMesh.rotation.x, 0, 0.1);
                }

                // --- ФИЗИКА ГРАНАТ ---
                for(let i=grenades.length-1; i>=0; i--) {
                    const g = grenades[i];
                    const age = time - g.userData.spawnTime;
                    
                    // Гравитация
                    g.userData.vel.y -= 20.0 * delta;
                    g.position.addScaledVector(g.userData.vel, delta);
                    
                    // Отскок от пола
                    if(g.position.y < 0.2) {
                        g.position.y = 0.2;
                        g.userData.vel.y *= -0.5; // Теряем энергию
                        g.userData.vel.x *= 0.8;  // Трение
                        g.userData.vel.z *= 0.8;
                    }
                    
                    // Взрыв по времени или если застряла
                    if(age > g.userData.explodeTime) {
                        explodeGrenade(g);
                    }
                }

                // --- ПРЕДМЕТЫ (АПТЕЧКИ) ---
                for(let i=items.length-1; i>=0; i--) {
                    const item = items[i];
                    item.mesh.rotation.y += delta;
                    item.mesh.rotation.z = Math.sin(time * 0.005) * 0.2;
                    
                    if(item.mesh.position.distanceTo(controls.getObject().position) < 3) {
                        if(item.type === 'medkit') {
                            health = Math.min(100, health + item.heal);
                            showMessage("MEDKIT USED: +" + item.heal + " HP");
                            createParticles(item.mesh.position, 0x00ff00, 10);
                            updateUI();
                        }
                        scene.remove(item.mesh);
                        items.splice(i, 1);
                    }
                }

                // --- ЛОГИКА ТУРЕЛЕЙ ---
                turrets.forEach((t) => {
                    let target = null;
                    let minDist = t.range;
                    enemies.forEach(e => {
                        const d = t.mesh.position.distanceTo(e.position);
                        if(d < minDist) { minDist = d; target = e; }
                    });

                    if(target) {
                        t.head.lookAt(target.position);
                        if(t.cooldown <= 0) {
                            t.cooldown = t.fireRate; 
                            
                            let bulletType = 'bullet';
                            let bulletColor = 0x00ff00;
                            let bulletGeo, bulletMat;

                            if(t.level === 6) {
                                bulletType = 'rocket';
                                bulletColor = 0xff0000;
                                bulletGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.8);
                                bulletMat = new THREE.MeshStandardMaterial({color:0x333});
                                const offsets = [-0.15, -0.05, 0.05, 0.15];
                                offsets.forEach(off => {
                                    const b = new THREE.Mesh(bulletGeo, bulletMat);
                                    b.rotation.x = Math.PI/2;
                                    const muzzlePos = new THREE.Vector3(off, 0, 0.8);
                                    muzzlePos.applyMatrix4(t.head.matrixWorld);
                                    b.position.copy(muzzlePos);
                                    const dir = new THREE.Vector3();
                                    dir.subVectors(target.position, b.position).normalize();
                                    dir.x += off * 0.1; 
                                    b.userData = { vel: dir.multiplyScalar(50), dmg: t.damage, isTurretBullet: true, type: 'rocket' };
                                    scene.add(b); bullets.push(b);
                                });
                                return;
                            } else if(t.level === 5) {
                                bulletGeo = new THREE.SphereGeometry(0.15); bulletMat = new THREE.MeshBasicMaterial({color:0x00ffff});
                            } else if(t.level === 4) {
                                bulletGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.8); bulletMat = new THREE.MeshStandardMaterial({color:0x333});
                                bulletType = 'rocket';
                            } else if(t.level === 3) {
                                bulletGeo = new THREE.SphereGeometry(0.2); bulletMat = new THREE.MeshBasicMaterial({color:0xffaa00});
                                bulletType = 'fire';
                            } else if (t.level === 2) {
                                bulletGeo = new THREE.SphereGeometry(0.08); bulletMat = new THREE.MeshBasicMaterial({color:0x0088ff});
                            } else {
                                bulletGeo = new THREE.SphereGeometry(0.1); bulletMat = new THREE.MeshBasicMaterial({color:0x00ff00});
                            }

                            const muzzlePos = new THREE.Vector3(0, 0, 0.6);
                            muzzlePos.applyMatrix4(t.head.matrixWorld);
                            const b = new THREE.Mesh(bulletGeo, bulletMat);
                            b.position.copy(muzzlePos);
                            const dir = new THREE.Vector3();
                            dir.subVectors(target.position, b.position).normalize();
                            if(t.level === 3) {
                                dir.x += (Math.random()-0.5)*0.2; dir.y += (Math.random()-0.5)*0.2; dir.z += (Math.random()-0.5)*0.2;
                            }
                            b.userData = { vel: dir.multiplyScalar(t.level === 4 ? 50 : 100), dmg: t.damage, isTurretBullet: true, type: bulletType };
                            scene.add(b); bullets.push(b);
                        }
                    }
                    if(t.cooldown > 0) t.cooldown -= delta;
                });

                // Raycast для меню улучшения
                if(currentWeaponKey === 'turret_tool') {
                    const raycaster = new THREE.Raycaster();
                    raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
                    const intersects = raycaster.intersectObjects(scene.children);
                    for (let hit of intersects) {
                        let obj = hit.object;
                        while(obj.parent && obj.parent !== scene) obj = obj.parent;
                        const found = turrets.find(t => t.mesh === obj);
                        if(found && hit.distance < 15) { 
                            const nextLv = found.level + 1;
                            if(nextLv <= 6) {
                                upgradeMenu.style.display = 'block';
                                let cost = 0, desc = "";
                                if(nextLv === 2) { cost = UPGRADE_LV2_COST; desc = "Next: Rapid Fire"; }
                                if(nextLv === 3) { cost = UPGRADE_LV3_COST; desc = "Next: FLAMETHROWER"; }
                                if(nextLv === 4) { cost = UPGRADE_LV4_COST; desc = "Next: ROCKET"; }
                                if(nextLv === 5) { cost = UPGRADE_LV5_COST; desc = "Next: PLASMA BEAM"; }
                                if(nextLv === 6) { cost = UPGRADE_LV6_COST; desc = "Next: QUAD MISSILE POD"; }
                                upTitle.innerText = `UPGRADE TO LVL ${nextLv}`;
                                upCost.innerText = `COST: ${cost}`;
                                upDesc.innerText = desc;
                                upCost.style.color = score >= cost ? '#ff0' : '#f00';
                            }
                            break;
                        }
                    }
                }

                // Спавн врагов
                if(!bossActive && enemiesToSpawn > 0) {
                    spawnTimer += delta;
                    if(spawnTimer > 0.8) { spawnEnemy(); enemiesToSpawn--; spawnTimer = 0; updateUI(); }
                } else if (!bossActive && enemies.length === 0) {
                    wave++;
                    startWave();
                }

                // Частицы
                for(let i=particles.length-1; i>=0; i--) {
                    const p = particles[i];
                    p.position.addScaledVector(p.userData.vel, delta);
                    p.userData.vel.y -= 9.8 * delta; 
                    p.userData.life -= delta * 2;
                    p.scale.setScalar(p.userData.life);
                    if(p.userData.life <= 0) { scene.remove(p); particles.splice(i,1); }
                }

                // Пули
                for(let i=bullets.length-1; i>=0; i--) {
                    const b = bullets[i];
                    b.position.addScaledVector(b.userData.vel, delta);
                    if(b.position.distanceTo(controls.getObject().position) > 200 || (b.userData.life !== undefined && (b.userData.life -= delta) <= 0)) {
                        scene.remove(b); bullets.splice(i,1); continue;
                    }

                    let hit = false;
                    for(let j=enemies.length-1; j>=0; j--) {
                        const e = enemies[j];
                        const distLimit = e.userData.type === 'boss' ? 5.0 : 1.5;
                        if(b.position.distanceTo(e.position) < distLimit) {
                            hit = true;
                            createParticles(b.position, b.userData.type === 'fire' ? 0xffaa00 : (b.userData.type === 'rocket' ? 0xff0000 : b.material.color), 3);

                            if(b.userData.type === 'rocket') {
                                const exp = new THREE.PointLight(0xffaa00, 5, 15);
                                exp.position.copy(b.position); scene.add(exp);
                                setTimeout(()=>scene.remove(exp), 100);
                                createParticles(b.position, 0xffaa00, 20);
                                enemies.forEach(near => {
                                    if(near.position.distanceTo(b.position) < 10) {
                                        near.userData.hp -= b.userData.dmg;
                                        if(near.userData.type === 'boss') bossFill.style.width = (near.userData.hp/near.userData.maxHp*100)+'%';
                                    }
                                });
                            } else {
                                e.userData.hp -= (b.userData.dmg || 1);
                                if(e.userData.type === 'boss') bossFill.style.width = (e.userData.hp/e.userData.maxHp*100)+'%';
                                e.material.emissive.setHex(0xffffff);
                                setTimeout(()=>e.material.emissive.setHex(e.userData.type==='boss'?0x550000:0x330000), 50);
                            }
                            
                            if(e.userData.hp <= 0) killEnemy(e);
                            break;
                        }
                    }
                    if(hit && b.userData.type !== 'fire') { scene.remove(b); bullets.splice(i,1); }
                }

                // Враги
                const pPos = controls.getObject().position;
                enemies.forEach(e => {
                    let targetPos = pPos;
                    let minDst = e.position.distanceTo(pPos);
                    let targetTurret = null;
                    turrets.forEach(t => {
                        const d = e.position.distanceTo(t.mesh.position);
                        if(d < minDst) { minDst = d; targetTurret = t; targetPos = t.mesh.position; }
                    });

                    e.lookAt(targetPos.x, e.position.y, targetPos.z);
                    
                    if(e.userData.type === 'boss') {
                        e.translateZ(e.userData.speed * delta);
                        if(e.position.distanceTo(e.userData.lastPos) < 1) {
                            e.userData.stuckTimer += delta;
                            if(e.userData.stuckTimer > 1.5) {
                                const dirToPlayer = new THREE.Vector3().subVectors(pPos, e.position).normalize();
                                e.position.add(dirToPlayer.multiplyScalar(10));
                                e.userData.stuckTimer = 0;
                            }
                        } else { e.userData.stuckTimer = 0; }
                        e.userData.lastPos.copy(e.position);
                        if(e.userData.hp < e.userData.maxHp * 0.3) {
                             e.material.emissive.setHex(0xff0000); 
                             e.scale.setScalar(1 + Math.sin(time * 0.01)*0.1); 
                        }
                    } else {
                        e.translateZ((8 + wave*0.5) * delta);
                    }
                    
                    const distLimit = e.userData.type === 'boss' ? 6.0 : 1.5;
                    if(e.position.distanceTo(pPos) < distLimit) takeDamage(e.userData.dmg * delta);
                    
                    if(targetTurret && e.position.distanceTo(targetTurret.mesh.position) < distLimit) {
                        targetTurret.hp -= e.userData.dmg * delta;
                        let baseCol = 0x00aaaa;
                        if(targetTurret.level === 2) baseCol = 0x0088ff;
                        if(targetTurret.level === 3) baseCol = 0xff4400;
                        if(targetTurret.level === 4) baseCol = 0x333333;
                        if(targetTurret.level === 5) baseCol = 0x444444;
                        if(targetTurret.level === 6) baseCol = 0x111111;
                        targetTurret.mesh.children[0].material.color.setHex(0xff0000);
                        setTimeout(() => { if(targetTurret) targetTurret.mesh.children[0].material.color.setHex(baseCol); }, 50);
                        if(targetTurret.hp <= 0) {
                            createParticles(targetTurret.mesh.position, baseCol, 15);
                            scene.remove(targetTurret.mesh);
                            turrets = turrets.filter(t => t !== targetTurret);
                            updateUI();
                        }
                    }
                });
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('mousedown', (e) => {
            if(e.button === 0 && controls.isLocked && !WEAPONS[currentWeaponKey].auto && WEAPONS[currentWeaponKey].type !== 'tool') {
                shoot();
            }
        });

        startWave();

    </script>
</body>
</html>
